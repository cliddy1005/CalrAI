<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3D24"/>
      <stop offset="100%" style="stop-color:#0D1F14"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CC764"/>
      <stop offset="100%" style="stop-color:#2D9B4E"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <!-- Stylized C letter -->
  <path d="M580 280c-140 0-260 105-260 232s120 232 260 232c50 0 96-14 134-38"
        fill="none" stroke="#4CC764" stroke-width="64" stroke-linecap="round"/>
  <!-- Leaf shape emerging from top of C -->
  <path d="M650 260 Q720 180 780 200 Q800 260 740 320 Q700 280 650 260Z"
        fill="url(#leaf)" opacity="0.95"/>
  <!-- Leaf vein -->
  <line x1="715" y1="210" x2="690" y2="295" stroke="#1A3D24" stroke-width="4" stroke-linecap="round"/>
  <!-- Circuit dots (AI theme) -->
  <circle cx="780" cy="200" r="12" fill="#4CC764" opacity="0.8"/>
  <circle cx="810" cy="240" r="8" fill="#4CC764" opacity="0.6"/>
  <circle cx="830" cy="200" r="6" fill="#4CC764" opacity="0.5"/>
  <!-- Connecting lines between dots -->
  <line x1="780" y1="200" x2="810" y2="240" stroke="#4CC764" stroke-width="3" opacity="0.5"/>
  <line x1="810" y1="240" x2="830" y2="200" stroke="#4CC764" stroke-width="2" opacity="0.4"/>
  <!-- Fork tines (subtle, bottom right) -->
  <g transform="translate(720, 520) rotate(15)" opacity="0.2">
    <line x1="0" y1="0" x2="0" y2="160" stroke="#4CC764" stroke-width="12" stroke-linecap="round"/>
    <line x1="-24" y1="0" x2="-24" y2="60" stroke="#4CC764" stroke-width="12" stroke-linecap="round"/>
    <line x1="24" y1="0" x2="24" y2="60" stroke="#4CC764" stroke-width="12" stroke-linecap="round"/>
  </g>
</svg>
